[phases.setup]
nixPkgs = ["chromium", "chromedriver"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "ln -sf $(which chromium) /usr/local/bin/google-chrome || true",
  "ln -sf $(which chromedriver) /usr/local/bin/chromedriver-local || true"
]

[start]
cmd = "python algarve_monitor.py"
